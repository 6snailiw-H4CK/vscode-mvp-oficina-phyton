<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            color: white;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 1.5rem 3rem rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body>
    <div class="card login-card shadow-lg overflow-hidden">
        <div class="card-body p-4 p-sm-5">
            <div class="text-center mb-4">
                <div class="avatar avatar-lg bg-white text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:72px; height:72px;">
                    <i class="bi bi-tools" style="font-size:2rem;"></i>
                </div>
                <h2 class="h4 mb-1 text-dark">Bem-vindo de volta</h2>
                <p class="text-muted mb-0">Faça login para acessar o painel profissional de oficina.</p>
            </div>

            <form id="login-form">
                <div class="mb-3">
                    <label for="email" class="form-label text-dark">E-mail</label>
                    <input type="email" class="form-control" id="email" placeholder="seu.email@exemplo.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-dark">Senha</label>
                    <input type="password" class="form-control" id="password" placeholder="Digite sua senha" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Entrar</button>
                </div>
                <p class="text-center text-muted mt-3 mb-0">Acesso apenas de demonstração. Sem autenticação real.</p>
            </form>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
