<!-- Página de Clientes -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Sistema Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-boxes"></i> Sistema Simples
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="clientes.html"><i class="bi bi-people"></i> Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="fornecedores.html"><i class="bi bi-shop"></i> Fornecedores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="produtos.html"><i class="bi bi-box"></i> Produtos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="estoque.html"><i class="bi bi-graph-up"></i> Estoque</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ordens-servico.html"><i class="bi bi-tools"></i> Ordens de Serviço</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="display-6"><i class="bi bi-people"></i> Clientes</h1>
                <p class="text-muted">Gestão de clientes cadastrados no sistema</p>
            </div>
        </div>

        <!-- Botão Novo Cliente -->
        <div class="row mb-4">
            <div class="col-12">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNovoCliente">
                    <i class="bi bi-person-plus"></i> Novo Cliente
                </button>
                <button class="btn btn-outline-secondary" onclick="carregarClientes()">
                    <i class="bi bi-arrow-clockwise"></i> Atualizar
                </button>
            </div>
        </div>

        <!-- Tabela de Clientes -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Lista de Clientes</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nome</th>
                                    <th>CPF/CNPJ</th>
                                    <th>Email</th>
                                    <th>Telefone</th>
                                    <th>Cidade</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaClientes">
                                <tr>
                                    <td colspan="8" class="text-center text-muted">Carregando...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Novo/Editar Cliente -->
    <div class="modal fade" id="modalNovoCliente" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Novo Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCliente">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nome" class="form-label">Nome *</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="cpf_cnpj" class="form-label">CPF/CNPJ</label>
                                <input type="text" class="form-control" id="cpf_cnpj" placeholder="000.000.000-00">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="telefone" class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-0000">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="endereco" class="form-label">Endereço</label>
                            <input type="text" class="form-control" id="endereco">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="cidade" class="form-label">Cidade</label>
                                <input type="text" class="form-control" id="cidade">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="estado" class="form-label">Estado</label>
                                <input type="text" class="form-control" id="estado" placeholder="SP" maxlength="2">
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSalvarCliente">Salvar Cliente</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-light text-center py-4 mt-5 border-top">
        <p class="text-muted mb-0">Sistema Simples v1.0.0 © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        const API_URL = '/api/v1';
        let clienteEmEdicao = null;
        let modalCliente;

        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            modalCliente = new bootstrap.Modal(document.getElementById('modalNovoCliente'));
            carregarClientes();

            document.getElementById('btnSalvarCliente').addEventListener('click', salvarCliente);
            document.getElementById('modalNovoCliente').addEventListener('hidden.bs.modal', limparFormulario);
        });

        // Carregar clientes
        async function carregarClientes() {
            try {
                const clientes = await apiGet('/clientes?limit=1000&ativo=true');
                const tabela = document.getElementById('tabelaClientes');
                
                if (clientes.length === 0) {
                    tabela.innerHTML = '<tr><td colspan="8" class="text-center text-muted">Nenhum cliente cadastrado</td></tr>';
                    return;
                }

                tabela.innerHTML = clientes.map(cliente => `
                    <tr>
                        <td>${cliente.id}</td>
                        <td>${cliente.nome}</td>
                        <td>${cliente.cpf_cnpj || '-'}</td>
                        <td>${cliente.email || '-'}</td>
                        <td>${cliente.telefone || '-'}</td>
                        <td>${cliente.cidade || '-'}</td>
                        <td>
                            <span class="badge bg-${cliente.ativo ? 'success' : 'danger'}">
                                ${cliente.ativo ? 'Ativo' : 'Inativo'}
                            </span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="editarCliente(${cliente.id})">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-sm btn-danger" onclick="deletarCliente(${cliente.id})">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                mostrarAlerta('Erro ao carregar clientes: ' + error.message, 'danger');
            }
        }

        // Editar cliente
        async function editarCliente(id) {
            try {
                const cliente = await apiGet(`/clientes/${id}`);
                document.getElementById('nome').value = cliente.nome;
                document.getElementById('cpf_cnpj').value = cliente.cpf_cnpj || '';
                document.getElementById('email').value = cliente.email || '';
                document.getElementById('telefone').value = cliente.telefone || '';
                document.getElementById('endereco').value = cliente.endereco || '';
                document.getElementById('cidade').value = cliente.cidade || '';
                document.getElementById('estado').value = cliente.estado || '';
                
                clienteEmEdicao = id;
                document.getElementById('tituloModal').textContent = 'Editar Cliente';
                modalCliente.show();
            } catch (error) {
                mostrarAlerta('Erro ao carregar cliente: ' + error.message, 'danger');
            }
        }

        // Salvar cliente
        async function salvarCliente() {
            const dados = {
                nome: document.getElementById('nome').value,
                cpf_cnpj: document.getElementById('cpf_cnpj').value || null,
                email: document.getElementById('email').value || null,
                telefone: document.getElementById('telefone').value || null,
                endereco: document.getElementById('endereco').value || null,
                cidade: document.getElementById('cidade').value || null,
                estado: document.getElementById('estado').value || null,
            };

            try {
                if (clienteEmEdicao) {
                    await apiPut(`/clientes/${clienteEmEdicao}`, dados);
                    mostrarAlerta('Cliente atualizado com sucesso!', 'success');
                } else {
                    await apiPost('/clientes', dados);
                    mostrarAlerta('Cliente criado com sucesso!', 'success');
                }
                
                modalCliente.hide();
                carregarClientes();
            } catch (error) {
                mostrarAlerta('Erro ao salvar cliente: ' + error.message, 'danger');
            }
        }

        // Deletar cliente
                async function deletarCliente(id) {
            if (!confirm('Deseja desativar este cliente?')) return;

            try {
                await apiDelete(`/clientes/${id}`);
                mostrarAlerta('Cliente desativado com sucesso!', 'success');
                carregarClientes();
            } catch (error) {
                mostrarAlerta('Erro ao desativar cliente: ' + error.message, 'danger');
            }
        }


        // Limpar formulário
        function limparFormulario() {
            document.getElementById('formCliente').reset();
            clienteEmEdicao = null;
            document.getElementById('tituloModal').textContent = 'Novo Cliente';
        }
    </script>
</body>
</html>
