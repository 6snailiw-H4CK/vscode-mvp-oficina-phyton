<!-- Página de Produtos -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produtos - Sistema Simples</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="bi bi-boxes"></i> Sistema Simples
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="clientes.html"><i class="bi bi-people"></i> Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="fornecedores.html"><i class="bi bi-shop"></i> Fornecedores</a></li>
                    <li class="nav-item"><a class="nav-link active" href="produtos.html"><i class="bi bi-box"></i> Produtos</a></li>
                    <li class="nav-item"><a class="nav-link" href="estoque.html"><i class="bi bi-graph-up"></i> Estoque</a></li>
                    <li class="nav-item"><a class="nav-link" href="ordens-servico.html"><i class="bi bi-tools"></i> Ordens de Serviço</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid py-4">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="display-6"><i class="bi bi-box"></i> Produtos</h1>
                <p class="text-muted">Gerenciamento do catálogo de produtos</p>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNovoProduto">
                    <i class="bi bi-plus-circle"></i> Novo Produto
                </button>
                <button class="btn btn-outline-secondary" onclick="carregarProdutos()">
                    <i class="bi bi-arrow-clockwise"></i> Atualizar
                </button>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header bg-light">
                        <h5 class="mb-0">Lista de Produtos</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead>
                                <tr>
                                    <th>SKU</th>
                                    <th>Nome</th>
                                    <th>Categoria</th>
                                    <th>Qtd. Atual</th>
                                    <th>Preço Venda</th>
                                    <th>Status Estoque</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tabelaProdutos">
                                <tr><td colspan="7" class="text-center text-muted">Carregando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Novo/Editar Produto -->
    <div class="modal fade" id="modalNovoProduto" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Novo Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formProduto">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nome" class="form-label">Nome *</label>
                                <input type="text" class="form-control" id="nome" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="sku" class="form-label">SKU</label>
                                <input type="text" class="form-control" id="sku">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="descricao" class="form-label">Descrição</label>
                            <textarea class="form-control" id="descricao" rows="3"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="categoria" class="form-label">Categoria</label>
                                <input type="text" class="form-control" id="categoria">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="quantidade_atual" class="form-label">Qtd. em Estoque</label>
                                <input type="number" class="form-control" id="quantidade_atual" value="0" min="0">
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="fornecedor_id" class="form-label">Fornecedor</label>
                                <select class="form-select" id="fornecedor_id">
                                    <option value="">Selecione...</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="quantidade_minima" class="form-label">Qtd. Mínima</label>
                                <input type="number" class="form-control" id="quantidade_minima" value="0">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="preco_custo" class="form-label">Preço Custo</label>
                                <input type="number" class="form-control" id="preco_custo" step="0.01">
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="preco_venda" class="form-label">Preço Venda *</label>
                                <input type="number" class="form-control" id="preco_venda" step="0.01" required>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSalvarProduto">Salvar Produto</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-light text-center py-4 mt-5 border-top">
        <p class="text-muted mb-0">Sistema Simples v1.0.0 © 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        let produtoEmEdicao = null;
        let modalProduto;

        document.addEventListener('DOMContentLoaded', function() {
            modalProduto = new bootstrap.Modal(document.getElementById('modalNovoProduto'));
            carregarProdutos();
            carregarFornecedores();
            document.getElementById('btnSalvarProduto').addEventListener('click', salvarProduto);
            document.getElementById('modalNovoProduto').addEventListener('hidden.bs.modal', limparFormulario);
        });

        async function carregarProdutos() {
            try {
                const produtos = await apiGet('/produtos?limit=1000&ativo=true');
                const tabela = document.getElementById('tabelaProdutos');
                
                if (produtos.length === 0) {
                    tabela.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Nenhum produto cadastrado</td></tr>';
                    return;
                }

                tabela.innerHTML = produtos.map(p => {
                    const statusEstoque = p.quantidade_atual <= p.quantidade_minima ? 
                        '<span class="badge bg-danger">Baixo</span>' : 
                        '<span class="badge bg-success">OK</span>';
                    
                    return `
                        <tr>
                            <td>${p.sku || '-'}</td>
                            <td>${p.nome}</td>
                            <td>${p.categoria || '-'}</td>
                            <td>${p.quantidade_atual}</td>
                            <td>R$ ${p.preco_venda.toFixed(2)}</td>
                            <td>${statusEstoque}</td>
                            <td>
                                <button class="btn btn-sm btn-info" onclick="editarProduto(${p.id})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deletarProduto(${p.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                mostrarAlerta('Erro ao carregar produtos: ' + error.message, 'danger');
            }
        }

        async function carregarFornecedores() {
            try {
                const fornecedores = await apiGet('/fornecedores?limit=1000');
                const select = document.getElementById('fornecedor_id');
                select.innerHTML = '<option value="">Selecione...</option>';
                fornecedores.forEach(f => {
                    const option = document.createElement('option');
                    option.value = f.id;
                    option.textContent = f.nome;
                    select.appendChild(option);
                });
            } catch (error) {
                mostrarAlerta('Erro ao carregar fornecedores: ' + error.message, 'danger');
            }
        }

        async function editarProduto(id) {
            try {
                const produto = await apiGet(`/produtos/${id}`);
                document.getElementById('nome').value = produto.nome;
                document.getElementById('sku').value = produto.sku || '';
                document.getElementById('descricao').value = produto.descricao || '';
                document.getElementById('categoria').value = produto.categoria || '';
                document.getElementById('quantidade_atual').value = produto.quantidade_atual || 0;
                document.getElementById('quantidade_minima').value = produto.quantidade_minima || 0;
                document.getElementById('preco_custo').value = produto.preco_custo || '';
                document.getElementById('preco_venda').value = produto.preco_venda;
                document.getElementById('fornecedor_id').value = produto.fornecedor_id || '';
                
                produtoEmEdicao = id;
                modalProduto.show();
            } catch (error) {
                mostrarAlerta('Erro ao carregar produto: ' + error.message, 'danger');
            }
        }

        async function salvarProduto() {
            const dados = {
                nome: document.getElementById('nome').value,
                sku: document.getElementById('sku').value || null,
                descricao: document.getElementById('descricao').value || null,
                categoria: document.getElementById('categoria').value || null,
                quantidade_atual: parseInt(document.getElementById('quantidade_atual').value) || 0,
                quantidade_minima: parseInt(document.getElementById('quantidade_minima').value) || 0,
                preco_custo: parseFloat(document.getElementById('preco_custo').value) || null,
                preco_venda: parseFloat(document.getElementById('preco_venda').value),
                fornecedor_id: parseInt(document.getElementById('fornecedor_id').value) || null,
            };

            try {
                if (produtoEmEdicao) {
                    await apiPut(`/produtos/${produtoEmEdicao}`, dados);
                    mostrarAlerta('Produto atualizado com sucesso!', 'success');
                } else {
                    await apiPost('/produtos', dados);
                    mostrarAlerta('Produto criado com sucesso!', 'success');
                }
                modalProduto.hide();
                carregarProdutos();
            } catch (error) {
                mostrarAlerta('Erro ao salvar produto: ' + error.message, 'danger');
            }
        }

        async function deletarProduto(id) {
            if (!confirm('Deseja realmente excluir este produto?')) return;
            try {
                await apiDelete(`/produtos/${id}`);
                mostrarAlerta('Produto excluído com sucesso!', 'success');
                carregarProdutos();
            } catch (error) {
                mostrarAlerta('Erro ao excluir produto: ' + error.message, 'danger');
            }
        }

        function limparFormulario() {
            document.getElementById('formProduto').reset();
            produtoEmEdicao = null;
            document.querySelector('#modalNovoProduto .modal-title').textContent = 'Novo Produto';
        }
    </script>
</body>
</html>
